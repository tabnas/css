# Release workflow (Release Please) — mirrors the tabnas/json pilot.
#
# On push to main, release-please maintains a release PR. When it merges:
#   ts/  tags vX.Y.Z and publishes @tabnas/css to npm via Trusted Publishing
#        (OIDC) — register the trusted publisher once at
#        npmjs.com > @tabnas/css > Settings > Trusted publisher
#        (repo: tabnas/css, workflow: release.yml). For the org this is done
#        by tabnas/admin rollout/setup-npm-trusted-publishing.sh.
#   go/  tags go/vX.Y.Z; the Go module proxy picks tags up directly.

name: release

on:
  push:
    branches: [ main ]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      ts_release: ${{ steps.rp.outputs['ts--release_created'] }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: rp
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish-npm:
    needs: release-please
    if: needs.release-please.outputs.ts_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - name: Publish @tabnas/css (OIDC trusted publishing)
        working-directory: ts
        run: |
          npm install -g npm@latest
          npm i
          npm run build --if-present
          npm publish --access public
